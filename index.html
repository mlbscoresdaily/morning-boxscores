<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Morning Box Scores</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=IBM+Plex+Mono&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  padding: 18px;
  background: #e9e1cf;
  font-family: IBM Plex Mono;
  color: #111;
}

.page {
  max-width: 900px;
  margin: auto;
  background: #f8f4ea;
  padding: 25px;
  border: 1px solid rgba(0,0,0,0.12);
  box-shadow: 0 6px 16px rgba(0,0,0,0.08);
}

h1 {
  text-align: center;
  font-family: Playfair Display;
}

.section-title {
  margin-top: 30px;
  border-bottom: 1px solid #0002;
  padding-bottom: 5px;
  font-weight: bold;
}

.card {
  background: white;
  border: 1px solid #0001;
  padding: 10px;
  margin-top: 10px;
}

.row {
  display: flex;
  justify-content: space-between;
  padding: 4px 0;
}

.division-title {
  font-weight: bold;
  margin-top: 10px;
  border-bottom: 1px dotted #0002;
  padding-bottom: 4px;
}

.subtle {
  font-size: 0.85rem;
  opacity: 0.7;
}

</style>

</head>

<body>

<div class="page">

<h1>The Morning Box Scores</h1>

<div class="section-title">SCORES</div>
<div id="scores"></div>

<div class="section-title">STANDINGS</div>
<div id="standings"></div>

<div class="section-title">LEAGUE LEADERS</div>
<div id="leaders"></div>

</div>

<script>

async function load() {

  const now = new Date();
  const yesterday = new Date();
  yesterday.setDate(now.getDate() - 1);

  const yyyy = now.getFullYear();

  const mm = String(yesterday.getMonth()+1).padStart(2,'0');
  const dd = String(yesterday.getDate()).padStart(2,'0');

  const dateStr = `${yyyy}-${mm}-${dd}`;

  const scoresURL =
    `https://statsapi.mlb.com/api/v1/schedule?sportId=1&date=${dateStr}`;

  const standingsURL =
    `https://statsapi.mlb.com/api/v1/standings?leagueId=103,104&season=${yyyy}`;

  const leadersURL =
    `https://statsapi.mlb.com/api/v1/stats/leaders?season=${yyyy}&leaderCategories=homeRuns,battingAverage,rbi,stolenBases,wins,earnedRunAverage,whip`;

  const scoresDiv = document.getElementById("scores");
  const standingsDiv = document.getElementById("standings");
  const leadersDiv = document.getElementById("leaders");

  // ---------------- SCORES ----------------
  try {

    const res = await fetch(scoresURL);
    const data = await res.json();

    const games = data.dates?.[0]?.games || [];

    games.forEach(g => {

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <div class="row">
          <span>${g.teams.away.team.name}</span>
          <span>${g.teams.away.score ?? 0}</span>
        </div>
        <div class="row">
          <span>${g.teams.home.team.name}</span>
          <span>${g.teams.home.score ?? 0}</span>
        </div>
      `;

      scoresDiv.appendChild(card);

    });

  } catch {
    scoresDiv.innerHTML = "<div class='card'>Scores unavailable</div>";
  }

  // ---------------- STANDINGS (WITH GB + WILDCARD) ----------------
  try {

    const res = await fetch(standingsURL);
    const data = await res.json();

    const records = data.records || [];

    // group divisions + wildcard separately
    const grouped = {};

    records.forEach(div => {

      const nameRaw = div.division?.name || div.league?.name || "Division";

      let groupName = nameRaw;

      if (div.standingsType?.includes("wildCard")) {
        groupName = nameRaw.includes("American") ? "AL Wild Card" : "NL Wild Card";
      }

      if (!grouped[groupName]) grouped[groupName] = [];

      grouped[groupName].push(div);

    });

    Object.keys(grouped).forEach(groupName => {

      const block = document.createElement("div");
      block.className = "card";

      block.innerHTML = `<div class="division-title">${groupName}</div>`;

      grouped[groupName].forEach(div => {

        (div.teamRecords || []).forEach(t => {

          const row = document.createElement("div");
          row.className = "row";

          const gb =
            t.divisionGamesBack ??
            t.wildCardGamesBack ??
            "-";

          row.innerHTML = `
            <span>${t.team.name}</span>
            <span>${t.wins}-${t.losses} (${gb} GB)</span>
          `;

          block.appendChild(row);

        });

      });

      standingsDiv.appendChild(block);

    });

  } catch {
    standingsDiv.innerHTML = "<div class='card'>Standings unavailable</div>";
  }

  // ---------------- LEAGUE LEADERS (SAFE REAL VERSION) ----------------
  try {

    const res = await fetch(leadersURL);
    const data = await res.json();

    const cats = data.leagueLeaderCategories || [];

    if (!cats.length) {
      leadersDiv.innerHTML =
        "<div class='card'>Leaders temporarily unavailable</div>";
      return;
    }

    cats.forEach(cat => {

      const box = document.createElement("div");
      box.className = "card";

      box.innerHTML = `<div class="division-title">${cat.displayName}</div>`;

      (cat.leaders || []).slice(0,5).forEach(p => {

        const row = document.createElement("div");
        row.className = "row";

        row.innerHTML = `
          <span>${p.person.fullName}</span>
          <span>${p.value}</span>
        `;

        box.appendChild(row);

      });

      leadersDiv.appendChild(box);

    });

  } catch {
    leadersDiv.innerHTML = "<div class='card'>Leaders unavailable</div>";
  }

}

load();

</script>

</body>
</html>
