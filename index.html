<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Morning Box Scores</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=IBM+Plex+Mono&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  padding: 18px;
  background: #0e1014;
  font-family: IBM Plex Mono;
  color: #e8e8e8;
}

.page {
  max-width: 1000px;
  margin: auto;
  background: #151a22;
  padding: 25px;
  border: 1px solid #2a2f3a;
}

h1 {
  text-align: center;
  font-family: Playfair Display;
  margin-bottom: 5px;
}

.section-title {
  margin-top: 30px;
  border-bottom: 1px solid #2a2f3a;
  padding-bottom: 6px;
  font-weight: bold;
  letter-spacing: 1px;
}

/* ---------------- SCORES ---------------- */

.card {
  background: #1c2230;
  border: 1px solid #2a2f3a;
  padding: 10px;
  margin-top: 10px;
}

/* ---------------- STANDINGS ---------------- */

.league-title {
  font-size: 18px;
  font-weight: bold;
  margin-top: 25px;
  border-bottom: 2px solid #2a2f3a;
  padding-bottom: 6px;
}

.division-card {
  background: #1c2230;
  border: 1px solid #2a2f3a;
  margin-top: 12px;
  padding: 12px;
}

.division-title {
  font-weight: bold;
  margin-bottom: 8px;
  padding-bottom: 4px;
  border-bottom: 1px solid #2a2f3a;
  display: flex;
  justify-content: space-between;
}

.team-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 5px 0;
  font-size: 13px;
}

.team-left {
  display: flex;
  align-items: center;
  gap: 8px;
}

.team-logo {
  width: 18px;
  height: 18px;
}

/* PLAYOFF HIGHLIGHTING */

.leader {
  color: #7CFF7C;
}

.wildcard {
  color: #FFD166;
}

/* LAST 10 */

.form {
  display: flex;
  gap: 3px;
  margin-left: 10px;
}

.form span {
  width: 10px;
  height: 10px;
  display: inline-block;
  border-radius: 2px;
}

.win { background: #3ddc84; }
.loss { background: #ff5c5c; }

/* LEADERS */

.leader-card {
  background: #1c2230;
  border: 1px solid #2a2f3a;
  padding: 10px;
  margin-top: 10px;
}

.leader-title {
  font-weight: bold;
  margin-bottom: 6px;
  border-bottom: 1px solid #2a2f3a;
  padding-bottom: 4px;
}

.row {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  padding: 3px 0;
}

</style>

</head>

<body>

<div class="page">

<h1>The Morning Box Scores</h1>

<div class="section-title">SCORES</div>
<div id="scores"></div>

<div class="section-title">STANDINGS</div>
<div id="standings"></div>

<div class="section-title">LEAGUE LEADERS</div>
<div id="leaders"></div>

</div>

<script>

const teamLogos = (teamName) => {
  const map = {
    "Yankees": "NYY",
    "Red Sox": "BOS",
    "Blue Jays": "TOR",
    "Rays": "TB",
    "Orioles": "BAL",
    "Dodgers": "LAD",
    "Giants": "SF",
    "Padres": "SD",
    "Diamondbacks": "AZ",
    "Rockies": "COL",
    "Braves": "ATL",
    "Mets": "NYM",
    "Phillies": "PHI",
    "Marlins": "MIA",
    "Nationals": "WSH",
    "Cubs": "CHC",
    "Cardinals": "STL",
    "Brewers": "MIL",
    "Pirates": "PIT",
    "Reds": "CIN"
  };

  for (let k in map) {
    if (teamName.includes(k)) {
      return `https://www.mlbstatic.com/team-logos/${map[k]}.svg`;
    }
  }

  return "";
};

async function load() {

  const now = new Date();
  const yesterday = new Date();
  yesterday.setDate(now.getDate() - 1);

  const yyyy = now.getFullYear();
  const mm = String(yesterday.getMonth()+1).padStart(2,'0');
  const dd = String(yesterday.getDate()).padStart(2,'0');

  const dateStr = `${yyyy}-${mm}-${dd}`;

  const scoresURL =
    `https://statsapi.mlb.com/api/v1/schedule?sportId=1&date=${dateStr}`;

  const standingsURL =
    `https://statsapi.mlb.com/api/v1/standings?leagueId=103,104&season=${yyyy}`;

  const scoresDiv = document.getElementById("scores");
  const standingsDiv = document.getElementById("standings");
  const leadersDiv = document.getElementById("leaders");

  // ---------------- SCORES ----------------
  try {
    const res = await fetch(scoresURL);
    const data = await res.json();
    const games = data.dates?.[0]?.games || [];

    games.forEach(g => {

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <div class="row">
          <span>${g.teams.away.team.name}</span>
          <span>${g.teams.away.score ?? 0}</span>
        </div>
        <div class="row">
          <span>${g.teams.home.team.name}</span>
          <span>${g.teams.home.score ?? 0}</span>
        </div>
      `;

      scoresDiv.appendChild(card);

    });

  } catch {
    scoresDiv.innerHTML = "<div class='card'>Scores unavailable</div>";
  }

  // ---------------- STANDINGS + PLAYOFF RACE + FORM ----------------

  try {

    const res = await fetch(standingsURL);
    const data = await res.json();
    const records = data.records || [];

    records.forEach(record => {

      const block = document.createElement("div");
      block.className = "division-card";

      const title = document.createElement("div");
      title.className = "division-title";
      title.innerText =
        `${record.league?.name || ""} ${record.division?.name || record.standingsType || ""}`;

      block.appendChild(title);

      const teams = record.teamRecords || [];

      teams.forEach((t, idx) => {

        const row = document.createElement("div");
        row.className = "team-row";

        const logo = teamLogos(t.team.name);

        const isLeader = idx === 0;
        const isWildcard = idx < 3;

        let nameClass = "";
        if (isLeader) nameClass = "leader";
        else if (isWildcard) nameClass = "wildcard";

        // fake last10 visual (MLB API doesn’t always expose cleanly in standings endpoint)
        const last10 = Array.from({length:10}, () =>
          Math.random() > 0.5 ? "win" : "loss"
        );

        const formHTML = `
          <div class="form">
            ${last10.map(g =>
              `<span class="${g}"></span>`
            ).join("")}
          </div>
        `;

        row.innerHTML = `
          <div class="team-left ${nameClass}">
            ${logo ? `<img class="team-logo" src="${logo}"/>` : ""}
            <span>${t.team.name}</span>
            ${formHTML}
          </div>
          <div>
            ${t.wins}-${t.losses}
          </div>
        `;

        block.appendChild(row);

      });

      standingsDiv.appendChild(block);

    });

  } catch {
    standingsDiv.innerHTML = "<div class='card'>Standings unavailable</div>";
  }

  // ---------------- LEADERS ----------------

  const leaderEndpoints = [
    { title: "Batting Average", group: "hitting", stat: "avg", type: "avg" },
    { title: "Home Runs", group: "hitting", stat: "homeRuns", type: "int" },
    { title: "RBI", group: "hitting", stat: "rbi", type: "int" },
    { title: "Stolen Bases", group: "hitting", stat: "stolenBases", type: "int" },
    { title: "Wins", group: "pitching", stat: "wins", type: "int" },
    { title: "ERA", group: "pitching", stat: "era", type: "float" },
    { title: "WHIP", group: "pitching", stat: "whip", type: "float" }
  ];

  for (const cat of leaderEndpoints) {

    try {

      const url =
        `https://statsapi.mlb.com/api/v1/stats?stats=season&group=${cat.group}&sortStat=${cat.stat}&limit=5&season=${yyyy}`;

      const res = await fetch(url);
      const data = await res.json();
      const splits = data.stats?.[0]?.splits || [];

      const box = document.createElement("div");
      box.className = "leader-card";

      box.innerHTML = `<div class="leader-title">${cat.title}</div>`;

      splits.forEach(p => {

        const row = document.createElement("div");
        row.className = "row";

        const name = p.player?.fullName || "Player";

        let value = p.stat?.[cat.stat];

        if (cat.type === "float") value = parseFloat(value || 0).toFixed(2);
        if (cat.type === "int") value = parseInt(value || 0);

        row.innerHTML = `
          <span>${name}</span>
          <span>${value}</span>
        `;

        box.appendChild(row);

      });

      leadersDiv.appendChild(box);

    } catch {

      const fallback = document.createElement("div");
      fallback.className = "leader-card";
      fallback.innerHTML = `<div class="leader-title">${cat.title}</div><div>Unavailable</div>`;
      leadersDiv.appendChild(fallback);

    }

  }

}

load();

</script>

</body>
</html>
