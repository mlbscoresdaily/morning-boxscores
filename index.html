<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Morning Box Scores</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=IBM+Plex+Mono&display=swap" rel="stylesheet">

<style>

/* ---------------- DARK MODE BASE ---------------- */

body {
  margin: 0;
  padding: 18px;
  background: #0f1115;
  font-family: IBM Plex Mono;
  color: #e8e8e8;
}

.page {
  max-width: 950px;
  margin: auto;
  background: #161a22;
  padding: 25px;
  border: 1px solid #2a2f3a;
  box-shadow: 0 10px 30px rgba(0,0,0,0.6);
}

h1 {
  text-align: center;
  font-family: Playfair Display;
  margin-bottom: 5px;
  color: #ffffff;
}

.date {
  text-align: center;
  opacity: 0.6;
  margin-bottom: 20px;
}

/* ---------------- SECTION TITLES ---------------- */

.section-title {
  margin-top: 30px;
  border-bottom: 1px solid #2a2f3a;
  padding-bottom: 5px;
  font-weight: bold;
  color: #d6d6d6;
}

/* ---------------- SCORES ---------------- */

.card {
  background: #1c2230;
  border: 1px solid #2a2f3a;
  padding: 10px;
  margin-top: 10px;
}

/* ---------------- STANDINGS ---------------- */

.standings-league {
  margin-top: 15px;
}

.league-title {
  font-weight: bold;
  font-size: 16px;
  margin: 10px 0;
  border-bottom: 2px solid #2a2f3a;
  padding-bottom: 4px;
  color: #ffffff;
}

.division-block {
  background: #1c2230;
  border: 1px solid #2a2f3a;
  margin-bottom: 12px;
  padding: 10px;
}

.division-title {
  font-weight: bold;
  font-size: 14px;
  margin-bottom: 8px;
  border-bottom: 1px solid #2a2f3a;
  padding-bottom: 4px;
  color: #cfcfcf;
}

.stand-row {
  display: grid;
  grid-template-columns: 1fr auto;
  font-size: 13px;
  padding: 3px 0;
}

.stand-row span:last-child {
  text-align: right;
  opacity: 0.9;
}

/* ---------------- LEADERS ---------------- */

.leader-card {
  background: #1c2230;
  border: 1px solid #2a2f3a;
  padding: 10px;
  margin-top: 10px;
}

.leader-title {
  font-weight: bold;
  margin-bottom: 6px;
  border-bottom: 1px solid #2a2f3a;
  padding-bottom: 4px;
  color: #ffffff;
}

.row {
  display: flex;
  justify-content: space-between;
  padding: 3px 0;
  font-size: 13px;
}

</style>

</head>

<body>

<div class="page">

<h1>The Morning Box Scores</h1>
<div class="date" id="date"></div>

<div class="section-title">SCORES</div>
<div id="scores"></div>

<div class="section-title">STANDINGS</div>
<div id="standings"></div>

<div class="section-title">LEAGUE LEADERS</div>
<div id="leaders"></div>

</div>

<script>

async function load() {

  const now = new Date();
  const yesterday = new Date();
  yesterday.setDate(now.getDate() - 1);

  const yyyy = now.getFullYear();
  const mm = String(yesterday.getMonth()+1).padStart(2,'0');
  const dd = String(yesterday.getDate()).padStart(2,'0');

  const dateStr = `${yyyy}-${mm}-${dd}`;

  document.getElementById("date").innerText =
    yesterday.toDateString();

  const scoresURL =
    `https://statsapi.mlb.com/api/v1/schedule?sportId=1&date=${dateStr}`;

  const standingsURL =
    `https://statsapi.mlb.com/api/v1/standings?leagueId=103,104&season=${yyyy}`;

  const scoresDiv = document.getElementById("scores");
  const standingsDiv = document.getElementById("standings");
  const leadersDiv = document.getElementById("leaders");

  // ---------------- SCORES ----------------
  try {

    const res = await fetch(scoresURL);
    const data = await res.json();

    const games = data.dates?.[0]?.games || [];

    games.forEach(g => {

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <div class="row">
          <span>${g.teams.away.team.name}</span>
          <span>${g.teams.away.score ?? 0}</span>
        </div>
        <div class="row">
          <span>${g.teams.home.team.name}</span>
          <span>${g.teams.home.score ?? 0}</span>
        </div>
      `;

      scoresDiv.appendChild(card);

    });

  } catch {
    scoresDiv.innerHTML = "<div class='card'>Scores unavailable</div>";
  }

  // ---------------- STANDINGS (FULL DIVISION NAMES + WILDCARD) ----------------

  try {

    const res = await fetch(standingsURL);
    const data = await res.json();

    const records = data.records || [];

    const container = document.getElementById("standings");

    const formatDivisionName = (name) => {
      if (!name) return "Division";

      if (name.includes("American League")) {
        return "American League " + name.split("American League")[1].trim();
      }

      if (name.includes("National League")) {
        return "National League " + name.split("National League")[1].trim();
      }

      return name;
    };

    const leagues = {
      "American League": [],
      "National League": []
    };

    records.forEach(r => {
      const leagueName = r.league?.name || "League";
      if (!leagues[leagueName]) leagues[leagueName] = [];
      leagues[leagueName].push(r);
    });

    Object.keys(leagues).forEach(leagueName => {

      const leagueBlock = document.createElement("div");
      leagueBlock.className = "standings-league";

      const leagueTitle = document.createElement("div");
      leagueTitle.className = "league-title";
      leagueTitle.innerText = leagueName;

      leagueBlock.appendChild(leagueTitle);

      leagues[leagueName].forEach(div => {

        const divBlock = document.createElement("div");
        divBlock.className = "division-block";

        const divName =
          div.standingsType === "wildCard"
            ? leagueName + " Wild Card"
            : formatDivisionName(div.division?.name);

        const title = document.createElement("div");
        title.className = "division-title";
        title.innerText = divName;

        divBlock.appendChild(title);

        (div.teamRecords || []).forEach(t => {

          const row = document.createElement("div");
          row.className = "stand-row";

          const gb =
            t.divisionGamesBack ??
            t.wildCardGamesBack ??
            "-";

          row.innerHTML = `
            <span>${t.team.name}</span>
            <span>${t.wins}-${t.losses} (${gb} GB)</span>
          `;

          divBlock.appendChild(row);

        });

        leagueBlock.appendChild(divBlock);

      });

      container.appendChild(leagueBlock);

    });

  } catch {
    standingsDiv.innerHTML = "<div class='card'>Standings unavailable</div>";
  }

  // ---------------- LEAGUE LEADERS (UNCHANGED STABLE VERSION) ----------------

  const leaderEndpoints = [
    { title: "Batting Average", group: "hitting", stat: "avg", type: "avg" },
    { title: "Home Runs", group: "hitting", stat: "homeRuns", type: "int" },
    { title: "RBI", group: "hitting", stat: "rbi", type: "int" },
    { title: "Stolen Bases", group: "hitting", stat: "stolenBases", type: "int" },
    { title: "Wins", group: "pitching", stat: "wins", type: "int" },
    { title: "ERA", group: "pitching", stat: "era", type: "float" },
    { title: "WHIP", group: "pitching", stat: "whip", type: "float" }
  ];

  for (const cat of leaderEndpoints) {

    try {

      const url =
        `https://statsapi.mlb.com/api/v1/stats?stats=season&group=${cat.group}&sortStat=${cat.stat}&limit=5&season=${yyyy}`;

      const res = await fetch(url);
      const data = await res.json();

      const splits = data.stats?.[0]?.splits || [];

      const box = document.createElement("div");
      box.className = "leader-card";

      box.innerHTML = `<div class="leader-title">${cat.title}</div>`;

      splits.forEach(p => {

        const row = document.createElement("div");
        row.className = "row";

        const name = p.player?.fullName || "Player";

        let valueRaw = p.stat?.[cat.stat];

        let value =
          cat.type === "int"
            ? parseInt(valueRaw || 0)
            : cat.type === "float"
              ? parseFloat(valueRaw || 0).toFixed(2)
              : valueRaw;

        row.innerHTML = `
          <span>${name}</span>
          <span>${value}</span>
        `;

        box.appendChild(row);

      });

      leadersDiv.appendChild(box);

    } catch {

      const fallback = document.createElement("div");
      fallback.className = "leader-card";
      fallback.innerHTML = `<div class="leader-title">${cat.title}</div><div>Unavailable</div>`;
      leadersDiv.appendChild(fallback);

    }

  }

}

load();

</script>

</body>
</html>
