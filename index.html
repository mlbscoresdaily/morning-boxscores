<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Morning Box Scores</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=IBM+Plex+Mono&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  padding: 18px;
  background: #e9e1cf;
  font-family: IBM Plex Mono;
  color: #111;
}

.page {
  max-width: 900px;
  margin: auto;
  background: #f8f4ea;
  padding: 25px;
  border: 1px solid rgba(0,0,0,0.12);
}

h1 {
  text-align: center;
  font-family: Playfair Display;
}

.section-title {
  margin-top: 30px;
  border-bottom: 1px solid #0002;
  padding-bottom: 5px;
  font-weight: bold;
}

/* ---------------- SCORES ---------------- */

.card {
  background: white;
  border: 1px solid #0001;
  padding: 10px;
  margin-top: 10px;
}

/* ---------------- STANDINGS CLEAN ---------------- */

.division-block {
  margin-top: 15px;
  border: 1px solid #0001;
  background: white;
  padding: 10px;
}

.division-title {
  font-weight: bold;
  font-size: 14px;
  padding-bottom: 6px;
  margin-bottom: 8px;
  border-bottom: 1px solid #eee;
}

.stand-row {
  display: grid;
  grid-template-columns: 1fr auto;
  padding: 4px 0;
  font-size: 13px;
}

.stand-row span:last-child {
  text-align: right;
  opacity: 0.8;
}

/* ---------------- LEADERS ---------------- */

.leader-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
}

.leader-card {
  background: white;
  border: 1px solid #0001;
  padding: 10px;
}

.leader-title {
  font-weight: bold;
  border-bottom: 1px solid #eee;
  margin-bottom: 6px;
  padding-bottom: 4px;
}

.row {
  display: flex;
  justify-content: space-between;
  padding: 3px 0;
  font-size: 13px;
}

</style>

</head>

<body>

<div class="page">

<h1>The Morning Box Scores</h1>

<div class="section-title">SCORES</div>
<div id="scores"></div>

<div class="section-title">STANDINGS</div>
<div id="standings"></div>

<div class="section-title">LEAGUE LEADERS</div>
<div id="leaders" class="leader-grid"></div>

</div>

<script>

async function load() {

  const now = new Date();
  const yesterday = new Date();
  yesterday.setDate(now.getDate() - 1);

  const yyyy = now.getFullYear();
  const mm = String(yesterday.getMonth()+1).padStart(2,'0');
  const dd = String(yesterday.getDate()).padStart(2,'0');

  const dateStr = `${yyyy}-${mm}-${dd}`;

  const scoresURL =
    `https://statsapi.mlb.com/api/v1/schedule?sportId=1&date=${dateStr}`;

  const standingsURL =
    `https://statsapi.mlb.com/api/v1/standings?leagueId=103,104&season=${yyyy}`;

  const leaders = document.getElementById("leaders");

  // ---------------- SCORES ----------------
  try {

    const res = await fetch(scoresURL);
    const data = await res.json();

    const games = data.dates?.[0]?.games || [];

    games.forEach(g => {

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <div class="row">
          <span>${g.teams.away.team.name}</span>
          <span>${g.teams.away.score ?? 0}</span>
        </div>
        <div class="row">
          <span>${g.teams.home.team.name}</span>
          <span>${g.teams.home.score ?? 0}</span>
        </div>
      `;

      document.getElementById("scores").appendChild(card);

    });

  } catch {
    document.getElementById("scores").innerHTML =
      "<div class='card'>Scores unavailable</div>";
  }

  // ---------------- STANDINGS (CLEAN + DIVISIONS) ----------------
  try {

    const res = await fetch(standingsURL);
    const data = await res.json();

    const records = data.records || [];

    const container = document.getElementById("standings");

    records.forEach(div => {

      const block = document.createElement("div");
      block.className = "division-block";

      const name =
        div.division?.name ||
        div.league?.name ||
        "Division";

      block.innerHTML = `<div class="division-title">${name}</div>`;

      (div.teamRecords || []).forEach(t => {

        const row = document.createElement("div");
        row.className = "stand-row";

        row.innerHTML = `
          <span>${t.team.name}</span>
          <span>${t.wins}-${t.losses} (${t.divisionGamesBack ?? "-"} GB)</span>
        `;

        block.appendChild(row);

      });

      container.appendChild(block);

    });

  } catch {
    document.getElementById("standings").innerHTML =
      "<div class='card'>Standings unavailable</div>";
  }

  // ---------------- LEAGUE LEADERS (FIXED APPROACH) ----------------
  // MLB "leaders" endpoint is unreliable → use stable stats endpoints instead

  const leaderEndpoints = [
    { title: "Batting Average", url: `https://statsapi.mlb.com/api/v1/stats?stats=season&group=hitting&sortStat=avg&limit=5&season=${yyyy}` },
    { title: "Home Runs", url: `https://statsapi.mlb.com/api/v1/stats?stats=season&group=hitting&sortStat=homeRuns&limit=5&season=${yyyy}` },
    { title: "RBI", url: `https://statsapi.mlb.com/api/v1/stats?stats=season&group=hitting&sortStat=rbi&limit=5&season=${yyyy}` },
    { title: "Stolen Bases", url: `https://statsapi.mlb.com/api/v1/stats?stats=season&group=hitting&sortStat=stolenBases&limit=5&season=${yyyy}` },
    { title: "Wins", url: `https://statsapi.mlb.com/api/v1/stats?stats=season&group=pitching&sortStat=wins&limit=5&season=${yyyy}` },
    { title: "ERA", url: `https://statsapi.mlb.com/api/v1/stats?stats=season&group=pitching&sortStat=era&limit=5&season=${yyyy}` },
    { title: "WHIP", url: `https://statsapi.mlb.com/api/v1/stats?stats=season&group=pitching&sortStat=whip&limit=5&season=${yyyy}` }
  ];

  for (const cat of leaderEndpoints) {

    try {

      const res = await fetch(cat.url);
      const data = await res.json();

      const stats = data.stats?.[0]?.splits || [];

      const box = document.createElement("div");
      box.className = "leader-card";

      const title = document.createElement("div");
      title.className = "leader-title";
      title.innerText = cat.title;

      box.appendChild(title);

      stats.forEach(p => {

        const row = document.createElement("div");
        row.className = "row";

        const name = p.player?.fullName || "Player";
        const value = p.stat?.value ?? p.stat?.avg ?? "-";

        row.innerHTML = `
          <span>${name}</span>
          <span>${value}</span>
        `;

        box.appendChild(row);

      });

      leaders.appendChild(box);

    } catch {

      const fallback = document.createElement("div");
      fallback.className = "leader-card";
      fallback.innerHTML = `<div class="leader-title">${cat.title}</div><div class="row">Unavailable</div>`;
      leaders.appendChild(fallback);

    }

  }

}

load();

</script>

</body>
</html>
