<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Morning Box Scores</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=IBM+Plex+Mono&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  padding: 18px;
  background: #e9e1cf;
  font-family: IBM Plex Mono;
  color: #111;
}

.page {
  max-width: 950px;
  margin: auto;
  background: #f8f4ea;
  padding: 25px;
  border: 1px solid rgba(0,0,0,0.12);
  box-shadow: 0 6px 16px rgba(0,0,0,0.08);
}

h1 {
  text-align: center;
  font-family: Playfair Display;
  margin-bottom: 5px;
}

.date {
  text-align: center;
  opacity: 0.6;
  margin-bottom: 20px;
}

.section-title {
  margin-top: 30px;
  border-bottom: 1px solid #0002;
  padding-bottom: 5px;
  font-weight: bold;
}

/* SCORES */

.card {
  background: white;
  border: 1px solid #0001;
  padding: 10px;
  margin-top: 10px;
}

/* STANDINGS */

.division-block {
  margin-top: 15px;
  background: white;
  border: 1px solid #0001;
  padding: 10px;
}

.division-title {
  font-weight: bold;
  font-size: 14px;
  margin-bottom: 8px;
  border-bottom: 1px solid #eee;
  padding-bottom: 4px;
}

.stand-row {
  display: grid;
  grid-template-columns: 1fr auto;
  font-size: 13px;
  padding: 3px 0;
}

/* LEADERS */

.leader-card {
  background: white;
  border: 1px solid #0001;
  padding: 10px;
  margin-top: 10px;
}

.leader-title {
  font-weight: bold;
  margin-bottom: 6px;
  border-bottom: 1px solid #eee;
  padding-bottom: 4px;
}

.row {
  display: flex;
  justify-content: space-between;
  padding: 3px 0;
  font-size: 13px;
}

</style>

</head>

<body>

<div class="page">

<h1>The Morning Box Scores</h1>
<div class="date" id="date"></div>

<div class="section-title">SCORES</div>
<div id="scores"></div>

<div class="section-title">STANDINGS</div>
<div id="standings"></div>

<div class="section-title">LEAGUE LEADERS</div>
<div id="leaders"></div>

</div>

<script>

async function load() {

  const now = new Date();
  const yesterday = new Date();
  yesterday.setDate(now.getDate() - 1);

  const yyyy = now.getFullYear();
  const mm = String(yesterday.getMonth()+1).padStart(2,'0');
  const dd = String(yesterday.getDate()).padStart(2,'0');

  const dateStr = `${yyyy}-${mm}-${dd}`;

  document.getElementById("date").innerText =
    yesterday.toDateString();

  const scoresURL =
    `https://statsapi.mlb.com/api/v1/schedule?sportId=1&date=${dateStr}`;

  const standingsURL =
    `https://statsapi.mlb.com/api/v1/standings?leagueId=103,104&season=${yyyy}`;

  const scoresDiv = document.getElementById("scores");
  const standingsDiv = document.getElementById("standings");
  const leadersDiv = document.getElementById("leaders");

  // ---------------- SCORES ----------------
  try {

    const res = await fetch(scoresURL);
    const data = await res.json();

    const games = data.dates?.[0]?.games || [];

    games.forEach(g => {

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <div class="row">
          <span>${g.teams.away.team.name}</span>
          <span>${g.teams.away.score ?? 0}</span>
        </div>
        <div class="row">
          <span>${g.teams.home.team.name}</span>
          <span>${g.teams.home.score ?? 0}</span>
        </div>
      `;

      scoresDiv.appendChild(card);

    });

  } catch {
    scoresDiv.innerHTML = "<div class='card'>Scores unavailable</div>";
  }

  // ---------------- STANDINGS (DIVISIONS + WILDCARD + GB) ----------------
  try {

    const res = await fetch(standingsURL);
    const data = await res.json();

    const records = data.records || [];

    const container = standingsDiv;

    const grouped = {
      "AL East": [],
      "AL Central": [],
      "AL West": [],
      "NL East": [],
      "NL Central": [],
      "NL West": [],
      "AL Wild Card": [],
      "NL Wild Card": []
    };

    records.forEach(div => {

      const type = div.standingsType || "";
      const name = div.division?.name || "";

      let key = name;

      if (type.includes("wildCard")) {
        key = name.includes("American") ? "AL Wild Card" : "NL Wild Card";
      }

      if (!grouped[key]) grouped[key] = [];

      grouped[key].push(div);

    });

    Object.keys(grouped).forEach(groupName => {

      const divisions = grouped[groupName];
      if (!divisions.length) return;

      const block = document.createElement("div");
      block.className = "division-block";

      block.innerHTML = `<div class="division-title">${groupName}</div>`;

      divisions.forEach(div => {

        (div.teamRecords || []).forEach(t => {

          const row = document.createElement("div");
          row.className = "stand-row";

          const gb =
            t.divisionGamesBack ??
            t.wildCardGamesBack ??
            "-";

          row.innerHTML = `
            <span>${t.team.name}</span>
            <span>${t.wins}-${t.losses} (${gb} GB)</span>
          `;

          block.appendChild(row);

        });

      });

      container.appendChild(block);

    });

  } catch {
    standingsDiv.innerHTML = "<div class='card'>Standings unavailable</div>";
  }

  // ---------------- LEAGUE LEADERS (FIXED + CLEAN OUTPUT) ----------------

  const leaderEndpoints = [
    { title: "Batting Average", group: "hitting", stat: "avg", type: "avg" },
    { title: "Home Runs", group: "hitting", stat: "homeRuns", type: "int" },
    { title: "RBI", group: "hitting", stat: "rbi", type: "int" },
    { title: "Stolen Bases", group: "hitting", stat: "stolenBases", type: "int" },
    { title: "Wins", group: "pitching", stat: "wins", type: "int" },
    { title: "ERA", group: "pitching", stat: "era", type: "float" },
    { title: "WHIP", group: "pitching", stat: "whip", type: "float" }
  ];

  for (const cat of leaderEndpoints) {

    try {

      const url =
        `https://statsapi.mlb.com/api/v1/stats?stats=season&group=${cat.group}&sortStat=${cat.stat}&limit=5&season=${yyyy}`;

      const res = await fetch(url);
      const data = await res.json();

      const splits = data.stats?.[0]?.splits || [];

      const box = document.createElement("div");
      box.className = "leader-card";

      box.innerHTML = `<div class="leader-title">${cat.title}</div>`;

      splits.forEach(p => {

        const row = document.createElement("div");
        row.className = "row";

        const name = p.player?.fullName || "Player";

        let valueRaw = p.stat?.[cat.stat];

        let value;

        if (cat.type === "int") {
          value = parseInt(valueRaw || 0);
        } else if (cat.type === "float") {
          value = parseFloat(valueRaw || 0).toFixed(2);
        } else {
          value = valueRaw;
        }

        row.innerHTML = `
          <span>${name}</span>
          <span>${value}</span>
        `;

        box.appendChild(row);

      });

      leadersDiv.appendChild(box);

    } catch {

      const fallback = document.createElement("div");
      fallback.className = "leader-card";
      fallback.innerHTML = `<div class="leader-title">${cat.title}</div><div>Unavailable</div>`;
      leadersDiv.appendChild(fallback);

    }

  }

}

load();

</script>

</body>
</html>
