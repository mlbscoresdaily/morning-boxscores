<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Morning Box Scores</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=IBM+Plex+Mono&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  padding: 18px;
  background: #0f1115;
  font-family: IBM Plex Mono;
  color: #e8e8e8;
}

.page {
  max-width: 950px;
  margin: auto;
  background: #161a22;
  padding: 25px;
  border: 1px solid #2a2f3a;
}

h1 {
  text-align: center;
  font-family: Playfair Display;
}

.section-title {
  margin-top: 30px;
  border-bottom: 1px solid #2a2f3a;
  padding-bottom: 5px;
  font-weight: bold;
}

.card {
  background: #1c2230;
  border: 1px solid #2a2f3a;
  padding: 10px;
  margin-top: 10px;
}

/* ---------------- STANDINGS ---------------- */

.league-title {
  font-weight: bold;
  font-size: 18px;
  margin-top: 20px;
  border-bottom: 2px solid #2a2f3a;
  padding-bottom: 6px;
}

.division-block {
  background: #1c2230;
  border: 1px solid #2a2f3a;
  margin-top: 12px;
  padding: 10px;
}

.division-title {
  font-weight: bold;
  margin-bottom: 8px;
  border-bottom: 1px solid #2a2f3a;
  padding-bottom: 4px;
}

.stand-row {
  display: grid;
  grid-template-columns: 1fr auto;
  font-size: 13px;
  padding: 3px 0;
}

/* LEADERS */

.leader-card {
  background: #1c2230;
  border: 1px solid #2a2f3a;
  padding: 10px;
  margin-top: 10px;
}

.leader-title {
  font-weight: bold;
  margin-bottom: 6px;
  border-bottom: 1px solid #2a2f3a;
  padding-bottom: 4px;
}

.row {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  padding: 3px 0;
}

</style>

</head>

<body>

<div class="page">

<h1>The Morning Box Scores</h1>

<div class="section-title">SCORES</div>
<div id="scores"></div>

<div class="section-title">STANDINGS</div>
<div id="standings"></div>

<div class="section-title">LEAGUE LEADERS</div>
<div id="leaders"></div>

</div>

<script>

async function load() {

  const now = new Date();
  const yesterday = new Date();
  yesterday.setDate(now.getDate() - 1);

  const yyyy = now.getFullYear();
  const mm = String(yesterday.getMonth()+1).padStart(2,'0');
  const dd = String(yesterday.getDate()).padStart(2,'0');

  const dateStr = `${yyyy}-${mm}-${dd}`;

  const scoresURL =
    `https://statsapi.mlb.com/api/v1/schedule?sportId=1&date=${dateStr}`;

  const standingsURL =
    `https://statsapi.mlb.com/api/v1/standings?leagueId=103,104&season=${yyyy}`;

  const scoresDiv = document.getElementById("scores");
  const standingsDiv = document.getElementById("standings");
  const leadersDiv = document.getElementById("leaders");

  // ---------------- SCORES ----------------
  try {

    const res = await fetch(scoresURL);
    const data = await res.json();

    const games = data.dates?.[0]?.games || [];

    games.forEach(g => {

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <div class="row">
          <span>${g.teams.away.team.name}</span>
          <span>${g.teams.away.score ?? 0}</span>
        </div>
        <div class="row">
          <span>${g.teams.home.team.name}</span>
          <span>${g.teams.home.score ?? 0}</span>
        </div>
      `;

      scoresDiv.appendChild(card);

    });

  } catch {
    scoresDiv.innerHTML = "<div class='card'>Scores unavailable</div>";
  }

  // ---------------- FIXED STANDINGS (NO DATA LOSS) ----------------

  try {

    const res = await fetch(standingsURL);
    const data = await res.json();

    const records = data.records || [];

    const grouped = {
      "American League East": [],
      "American League Central": [],
      "American League West": [],
      "National League East": [],
      "National League Central": [],
      "National League West": [],
      "American League Wild Card": [],
      "National League Wild Card": []
    };

    records.forEach(r => {

      const league = r.league?.name || "";
      const division = r.division?.name || "";
      const type = r.standingsType || "";

      const teams = r.teamRecords || [];

      let key = league + " " + division;

      if (type === "wildCardStandings") {
        key = league + " Wild Card";
      }

      if (!grouped[key]) grouped[key] = [];

      // IMPORTANT FIX:
      // we DO NOT spread or flatten incorrectly anymore
      grouped[key] = grouped[key].concat(teams);

    });

    Object.keys(grouped).forEach(name => {

      if (grouped[name].length === 0) return;

      const block = document.createElement("div");
      block.className = "division-block";

      const title = document.createElement("div");
      title.className = "division-title";
      title.innerText = name;

      block.appendChild(title);

      grouped[name].forEach(t => {

        const row = document.createElement("div");
        row.className = "stand-row";

        const gb =
          t.divisionGamesBack ??
          t.wildCardGamesBack ??
          "-";

        row.innerHTML = `
          <span>${t.team.name}</span>
          <span>${t.wins}-${t.losses} (${gb} GB)</span>
        `;

        block.appendChild(row);

      });

      standingsDiv.appendChild(block);

    });

  } catch {
    standingsDiv.innerHTML = "<div class='card'>Standings unavailable</div>";
  }

  // ---------------- LEAGUE LEADERS (UNCHANGED) ----------------

  const leaderEndpoints = [
    { title: "Batting Average", group: "hitting", stat: "avg", type: "avg" },
    { title: "Home Runs", group: "hitting", stat: "homeRuns", type: "int" },
    { title: "RBI", group: "hitting", stat: "rbi", type: "int" },
    { title: "Stolen Bases", group: "hitting", stat: "stolenBases", type: "int" },
    { title: "Wins", group: "pitching", stat: "wins", type: "int" },
    { title: "ERA", group: "pitching", stat: "era", type: "float" },
    { title: "WHIP", group: "pitching", stat: "whip", type: "float" }
  ];

  for (const cat of leaderEndpoints) {

    try {

      const url =
        `https://statsapi.mlb.com/api/v1/stats?stats=season&group=${cat.group}&sortStat=${cat.stat}&limit=5&season=${yyyy}`;

      const res = await fetch(url);
      const data = await res.json();

      const splits = data.stats?.[0]?.splits || [];

      const box = document.createElement("div");
      box.className = "leader-card";

      box.innerHTML = `<div class="leader-title">${cat.title}</div>`;

      splits.forEach(p => {

        const row = document.createElement("div");
        row.className = "row";

        const name = p.player?.fullName || "Player";

        let valueRaw = p.stat?.[cat.stat];

        let value =
          cat.type === "int"
            ? parseInt(valueRaw || 0)
            : cat.type === "float"
              ? parseFloat(valueRaw || 0).toFixed(2)
              : valueRaw;

        row.innerHTML = `
          <span>${name}</span>
          <span>${value}</span>
        `;

        box.appendChild(row);

      });

      leadersDiv.appendChild(box);

    } catch {

      const fallback = document.createElement("div");
      fallback.className = "leader-card";
      fallback.innerHTML = `<div class="leader-title">${cat.title}</div><div>Unavailable</div>`;
      leadersDiv.appendChild(fallback);

    }

  }

}

load();

</script>

</body>
</html>
