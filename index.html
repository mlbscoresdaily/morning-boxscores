<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>The Morning Box Scores</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=IBM+Plex+Mono&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  padding: 18px;
  background: #e9e1cf;
  font-family: IBM Plex Mono;
}

.page {
  max-width: 850px;
  margin: auto;
  background: #f8f4ea;
  padding: 25px;
  border: 1px solid #0002;
}

h1 {
  font-family: Playfair Display;
  text-align: center;
}

.section {
  margin-top: 30px;
}

.card {
  background: white;
  padding: 12px;
  margin-bottom: 10px;
  border: 1px solid #0001;
}

.row {
  display: flex;
  justify-content: space-between;
  padding: 4px 0;
}

.title {
  font-weight: bold;
  margin-bottom: 10px;
}

</style>

</head>

<body>

<div class="page">

<h1>The Morning Box Scores</h1>

<div class="section">
  <div class="title">Scores</div>
  <div id="scores"></div>
</div>

<div class="section">
  <div class="title">Standings</div>
  <div id="standings"></div>
</div>

<div class="section">
  <div class="title">Leaders</div>
  <div id="leaders"></div>
</div>

</div>

<script>

const API = "/.netlify/functions/mlb";

async function load(type) {
  const res = await fetch(`${API}?type=${type}`);
  return res.json();
}

async function init() {

  const scores = await load("scores");
  const standings = await load("standings");
  const leaders = await load("leaders");

  // ---------------- SCORES ----------------
  const s = document.getElementById("scores");

  scores.dates?.[0]?.games?.forEach(g => {

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="row">
        <span>${g.teams.away.team.name}</span>
        <span>${g.teams.away.score ?? 0}</span>
      </div>
      <div class="row">
        <span>${g.teams.home.team.name}</span>
        <span>${g.teams.home.score ?? 0}</span>
      </div>
    `;

    s.appendChild(div);

  });

  // ---------------- STANDINGS ----------------
  const st = document.getElementById("standings");

  standings.records?.forEach(d => {

    const div = document.createElement("div");
    div.className = "card";

    const name = (d.division?.name || "")
      .replace("American League","AL")
      .replace("National League","NL");

    div.innerHTML = `<div class="title">${name}</div>`;

    d.teamRecords?.forEach(t => {

      const row = document.createElement("div");
      row.className = "row";

      row.innerHTML = `
        <span>${t.team.name}</span>
        <span>${t.wins}-${t.losses}</span>
      `;

      div.appendChild(row);

    });

    st.appendChild(div);

  });

  // ---------------- LEADERS ----------------
  const l = document.getElementById("leaders");

  leaders.leagueLeaderCategories?.forEach(c => {

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `<div class="title">${c.displayName}</div>`;

    c.leaders?.slice(0,5).forEach(p => {

      const row = document.createElement("div");
      row.className = "row";

      row.innerHTML = `
        <span>${p.person.fullName}</span>
        <span>${p.value}</span>
      `;

      div.appendChild(row);

    });

    l.appendChild(div);

  });

}

init();

</script>

</body>
</html>
